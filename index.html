<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>NCC Camp Experience</title>

<style>

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
font-family:Arial;

background:linear-gradient(
to right,
#ff4c4c 0%,
#ff4c4c 33%,
#2b2f7f 33%,
#2b2f7f 66%,
#9ad9db 66%,
#9ad9db 100%
);
overflow:hidden;
}

header{
position:absolute;
top:0;
width:100%;
height:120px;
background:black;
display:flex;
align-items:center;
justify-content:center;
}

.logo{
width:90px;
animation:float 3s infinite ease-in-out,
glow 3s infinite alternate;
}

@keyframes float{
0%{transform:translateY(0)}
50%{transform:translateY(-8px)}
100%{transform:translateY(0)}
}

@keyframes glow{
from{filter:drop-shadow(0 0 3px gold)}
to{filter:drop-shadow(0 0 15px gold)}
}

.container{
background:rgba(255,255,255,0.15);
padding:40px;
border-radius:15px;
backdrop-filter:blur(10px);
text-align:center;
}

h1{
color:white;
margin-bottom:20px;
}

input{
padding:12px;
border:none;
border-radius:8px;
width:220px;
font-size:16px;
}

button{
margin-top:20px;
padding:12px 25px;
border:none;
border-radius:8px;
background:#ffcc00;
font-weight:bold;
cursor:pointer;
}

button:hover{
background:#ffd633;
}

</style>

</head>

<body>

<header>
<img src="ncc-logo.png" class="logo">
</header>

<div class="container">

<h1>Enter Your Name</h1>

<input id="name" placeholder="Your name">

<br>

<button onclick="enter()">Enter Experience</button>

</div>

<script>

function enter(){

let name=document.getElementById("name").value

if(name==""){
alert("Please enter your name")
return
}

localStorage.setItem("cadetName",name)

window.location.href="diary.html"

}

</script>

</body>
</html>
